syntax = "proto3";

option java_package = "io.athos.agrocore.plantmonitor.devices.sensors";

message SensorReading {
  int32 delta_ms = 1; // diferença em ms desde o timestamp base
  float value    = 2;
}

message SensorReadingBatch {
  int64 base_timestamp = 1;
  repeated SensorReading readings = 2;
}